<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গতি এক্সপ্রেস - স্টাফ ম্যানেজমেন্ট সিস্টেম</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* Prevent Copy Global */
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
        }
        /* Allow copy/typing only inside input fields */
        input, textarea, select { 
            user-select: text !important; 
            -webkit-user-select: text !important; 
            -moz-user-select: text !important;
            -ms-user-select: text !important;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0f172a] m-0 p-0 overflow-hidden" oncopy="return false" oncut="return false" oncontextmenu="return false">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 🔴 ফায়ারবেস ক্লাউড ডাটাবেস সেটআপ
        const firebaseConfig = {
            apiKey: "AIzaSyBmJGTuAvMF9FM6MwOSi4BZqFmGyqb2Yd0",
            authDomain: "goti-express.firebaseapp.com",
            projectId: "goti-express",
            storageBucket: "goti-express.firebasestorage.app",
            messagingSenderId: "427378824805",
            appId: "1:427378824805:web:54373b156fc7f40f65588c"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // English date formatter
        const formatDateEn = (date) => {
            try { return new Intl.DateTimeFormat('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' }).format(date); }
            catch (e) { return 'Invalid'; }
        };
        const formatDateISO = (date) => {
            const d = new Date(date);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };
        const formatTimeEn = (date) => new Intl.DateTimeFormat('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true }).format(date);

        const bengaliToEnglish = (str) => str.replace(/[০-৯]/g, d => '০১২৩৪৫৬৭৮৯'.indexOf(d).toString());
        const parseDateFromAnyFormat = (val) => {
            if (!val) return null;
            let s = val;
            s = bengaliToEnglish(s);
            let parts = s.split('/');
            if (parts.length === 3) {
                let d = parseInt(parts[0]), m = parseInt(parts[1])-1, y = parseInt(parts[2]);
                if (!isNaN(d) && !isNaN(m) && !isNaN(y)) return new Date(y, m, d);
            }
            parts = s.split('-');
            if (parts.length === 3) {
                let y = parseInt(parts[0]), m = parseInt(parts[1])-1, d = parseInt(parts[2]);
                if (!isNaN(d) && !isNaN(m) && !isNaN(y)) return new Date(y, m, d);
            }
            return null;
        };

        const migrateDates = (items, fields = ['date']) => {
            return items.map(item => {
                const newItem = {...item};
                fields.forEach(f => {
                    if (typeof newItem[f] === 'string') {
                        const d = parseDateFromAnyFormat(newItem[f]);
                        if (d && !isNaN(d)) newItem[f] = formatDateISO(d);
                    }
                });
                return newItem;
            });
        };

        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) { return initialValue; }
          });
          useEffect(() => {
            try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } 
            catch (error) {}
          }, [key, storedValue]);
          return [storedValue, setStoredValue];
        }

        function useDatabase(collectionName, initialData = []) {
            const [data, setData] = useState(() => {
                const local = window.localStorage.getItem('goti_' + collectionName);
                if (local) {
                    let parsed = JSON.parse(local);
                    if (['attendances','expenses','salaries','reports','incomes'].includes(collectionName)) {
                        parsed = migrateDates(parsed, ['date']);
                    }
                    return parsed;
                }
                return initialData;
            });

            useEffect(() => {
                const unsubscribe = db.collection(collectionName).orderBy('id', 'desc').onSnapshot(snapshot => {
                    let docs = snapshot.docs.map(doc => doc.data());
                    if (docs.length > 0) {
                        if (['attendances','expenses','salaries','reports','incomes'].includes(collectionName)) {
                            docs = migrateDates(docs, ['date']);
                        }
                        setData(docs);
                        window.localStorage.setItem('goti_' + collectionName, JSON.stringify(docs));
                    } else if (initialData.length > 0) {
                        initialData.forEach(item => 
                            db.collection(collectionName).doc(item.id.toString()).set(item)
                              .catch(err => console.log("Init write error:", err))
                        );
                    }
                }, error => console.error("Cloud Error:", error));
                return () => unsubscribe();
            }, [collectionName]);

            const addData = (newItem) => {
                const newData = [newItem, ...data];
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(newItem.id.toString()).set(newItem).catch(err => console.log("Add error:", err));
            };

            const updateData = (id, updatedFields) => {
                const newData = data.map(item => item.id === id ? { ...item, ...updatedFields } : item);
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(id.toString()).update(updatedFields).catch(err => console.log("Update error:", err));
            };

            const deleteData = (id) => {
                const newData = data.filter(item => item.id !== id);
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(id.toString()).delete().catch(err => console.log("Delete error:", err));
            };

            return [data, addData, updateData, deleteData];
        }

        const getCurrentTimeStr = () => {
            return new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Dhaka', year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            }).format(new Date());
        };

        const initialUsers = [
          { id: 1, name: 'Admin', loginId: 'sreebashkumar65@gmail.com', password: '01815151122', role: 'admin', designation: 'Administrator', avatar: null, canInvest: true, canApproveExp: true, canSubmitExp: true, canViewReports: true, canSubmitAttendance: true, canApproveLeave: true, canManageWebsite: true, canSubmitIncome: true },
          { id: 2, name: 'স্বাধীন আহমেদ তামিম', loginId: '01813910850', password: '01813910850', role: 'staff', designation: 'Technician', avatar: null, canInvest: false, canApproveExp: false, canSubmitExp: true, canViewReports: false, canSubmitAttendance: false, canApproveLeave: false, canManageWebsite: false, canSubmitIncome: false }
        ];

        // ==========================================
        // 🟡 Main App
        // ==========================================
        function App() {
          const [isLoggedIn, setIsLoggedIn] = useLocalStorage('goti_isLoggedIn', false);
          const [currentUser, setCurrentUser] = useLocalStorage('goti_currentUser', null);
          const [currentView, setCurrentView] = useLocalStorage('goti_currentView', 'dashboard');
          const [sidebarOpen, setSidebarOpen] = useState(false);

          const [dialog, setDialog] = useState({ open: false, type: '', msg: '', action: null, inputVal: '' });
          
          const showAlert = (msg) => setDialog({ open: true, type: 'alert', msg, action: null, inputVal: '' });
          const showConfirm = (msg, action) => setDialog({ open: true, type: 'confirm', msg, action, inputVal: '' });
          const showPrompt = (msg, action) => setDialog({ open: true, type: 'prompt', msg, action, inputVal: '' });

          const [users, addUser, updateUser, deleteUser] = useDatabase('users', initialUsers);
          const [attendances, addAttendance] = useDatabase('attendances', []);
          const [leaves, addLeave, updateLeave, deleteLeave] = useDatabase('leaves', []);
          const [expenses, addExpense, updateExpense, deleteExpense] = useDatabase('expenses', []);
          const [reports, addReport, updateReport, deleteReport] = useDatabase('reports', []);
          const [payments, addPaymentBase, updatePayment, deletePayment] = useDatabase('payments', []);
          const [salaries, addSalaryBase, updateSalary, deleteSalary] = useDatabase('salaries', []);
          const [investments, addInvestment, updateInvestment, deleteInvestment] = useDatabase('investments', []);
          const [incomes, addIncome, updateIncome, deleteIncome] = useDatabase('incomes', []);
          const [logs, addLog, , ] = useDatabase('logs', []);
          
          // 🌐 Website Management Databases
          const [webConfig, addConfig, updateConfig, ] = useDatabase('websiteConfig', [{id: 1, adsStatus: false, popupUrl: '', banners: []}]);
          const [packages, addPackage, updatePackage, deletePackage] = useDatabase('packages', []);
          const [complaints, , , deleteComplaint] = useDatabase('complaints', []);
          const [reviews, , updateReview, deleteReview] = useDatabase('reviews', []);

          // 🔴 New Notification Logic
          const todayISO = formatDateISO(new Date());
          const todayWeb = new Date().toLocaleDateString('en-GB'); // format used by website

          const hasNewAttendance = attendances.some(a => a.date === todayISO);
          const hasNewLeave = leaves.some(l => l.status === 'অপেক্ষমান');
          const hasNewExp = expenses.some(e => e.status === 'অপেক্ষমান');
          const hasNewReport = reports.some(r => r.date === todayISO);
          const hasNewIncome = incomes.some(i => i.date === todayISO);
          const hasNewPayment = payments.some(p => p.date === todayISO);
          const hasNewInvestment = investments.some(i => i.date === todayISO);
          const hasNewWeb = complaints.some(c => c.date === todayWeb) || reviews.some(r => r.date === todayWeb);

          const logAction = (action) => {
            if (!currentUser) return;
            addLog({ id: Date.now(), userId: currentUser.id, userName: currentUser.name, action, timestamp: new Date().toISOString() });
          };

          const addAttendanceWithLog = (item) => { addAttendance(item); logAction(`Submitted attendance`); };
          const addLeaveWithLog = (item) => { addLeave(item); logAction(`Applied leave from ${item.startDate} to ${item.endDate}`); };
          const addExpenseWithLog = (item) => { addExpense(item); logAction(`Added expense of ৳${item.amount}`); };
          const addReportWithLog = (item) => { addReport(item); logAction(`Submitted daily report`); };
          const addSalaryWithLog = (item) => { addSalaryBase(item); logAction(`Added salary entry for ${item.userName}`); };
          const addPaymentWithLog = (item) => { addPaymentBase(item); logAction(`Recorded payment to ${item.userName}`); };
          const addInvestmentWithLog = (item) => { addInvestment(item); logAction(`Added investment of ৳${item.amount}`); };
          const addIncomeWithLog = (item) => { addIncome(item); logAction(`Added income of ৳${item.amount}`); };
          const addUserWithLog = (item) => { addUser(item); logAction(`Added new staff: ${item.name}`); };

          useEffect(() => {
              if (currentUser) {
                  const updatedMe = users.find(u => u.id === currentUser.id);
                  if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                      setCurrentUser(updatedMe);
                  }
              }
          }, [users, currentUser]);

          useEffect(() => {
              if (currentUser?.role === 'admin') {
                  const threeMonthsAgo = new Date();
                  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
                  const cutoff = threeMonthsAgo.toISOString();
                  logs.filter(l => l.timestamp < cutoff).forEach(l => {
                      db.collection('logs').doc(l.id.toString()).delete().catch(()=>{});
                  });
                  const newLogs = logs.filter(l => l.timestamp >= cutoff);
                  if (newLogs.length !== logs.length) {
                      window.localStorage.setItem('goti_logs', JSON.stringify(newLogs));
                  }
              }
          }, [logs, currentUser]);

          const handleLogin = (e) => {
            e.preventDefault();
            const loginId = e.target.loginId.value;
            const password = e.target.password.value;
            const user = users.find(u => u.loginId === loginId && u.password === password);
            if (user) { setCurrentUser(user); setIsLoggedIn(true); setCurrentView('dashboard'); logAction('Logged in'); } 
            else { showAlert('লগইন আইডি অথবা পাসওয়ার্ড ভুল হয়েছে!'); }
          };

          const handleLogout = () => {
            showConfirm('আপনি কি লগআউট করতে চান?', () => {
              logAction('Logged out');
              setIsLoggedIn(false); setCurrentUser(null);
            });
          };

          const updateUserProfile = (updatedUser) => {
            setCurrentUser(updatedUser);
            updateUser(updatedUser.id, { avatar: updatedUser.avatar });
            logAction('Updated profile picture');
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#0f172a] flex flex-col items-center justify-center p-4">
                {dialog.open && <DialogBox dialog={dialog} setDialog={setDialog} />}
                <div className="mb-6 flex justify-center">
                   <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Logo" className="h-28 object-contain drop-shadow-2xl bg-white p-2 rounded-xl" />
                </div>
                <div className="max-w-md w-full bg-[#1e293b] border border-blue-900/50 rounded-2xl shadow-2xl p-8">
                  <div className="text-center mb-8">
                    <h1 className="text-3xl font-bold text-blue-400 mb-2">গতি এক্সপ্রেস</h1>
                    <p className="text-blue-200/60 text-sm">স্টাফ ম্যানেজমেন্ট সিস্টেম</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-blue-200 mb-2 pl-1">লগইন আইডি</label>
                      <div className="relative"><i className="fa-solid fa-user absolute left-4 top-3.5 text-slate-400"></i><input type="text" name="loginId" className="w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="ফোন বা ইমেইল" /></div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-blue-200 mb-2 pl-1">পাসওয়ার্ড</label>
                      <div className="relative"><i className="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400"></i><input type="password" name="password" className="w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="••••••••" /></div>
                    </div>
                    <button type="submit" className="w-full bg-blue-600 text-white py-3.5 rounded-xl hover:bg-blue-700 font-bold shadow-lg shadow-blue-900/50 mt-4 text-lg">লগইন করুন</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen bg-[#f1f5f9] overflow-hidden">
              {dialog.open && <DialogBox dialog={dialog} setDialog={setDialog} />}
              
              {sidebarOpen && <div className="md:hidden fixed inset-0 bg-slate-900/60 z-40 backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>}

              <div className={`fixed inset-y-0 left-0 z-50 w-72 md:w-64 transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out bg-[#1e293b] flex flex-col shadow-2xl`}>
                <div className="p-4 bg-[#0f172a] flex items-center justify-between md:justify-center h-16 shrink-0 border-b border-slate-700">
                  <div className="flex items-center gap-3"><img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Logo" className="h-8 object-contain bg-white rounded p-1" /><h2 className="text-xl font-bold text-blue-400 truncate">গতি এক্সপ্রেস</h2></div>
                  <button className="md:hidden text-slate-400 p-2" onClick={() => setSidebarOpen(false)}><i className="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <div className="md:hidden p-4 border-b border-slate-700/50 bg-slate-800/30 flex items-center gap-3">
                    {currentUser.avatar ? <img src={currentUser.avatar} className="w-10 h-10 rounded-full border-2 border-blue-500 object-cover" /> : <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-md">{currentUser.name.charAt(0)}</div>}
                    <div className="overflow-hidden"><p className="text-white font-bold truncate">{currentUser.name}</p><p className="text-blue-300 text-xs truncate capitalize">{currentUser.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                </div>

                <div className="flex-1 overflow-y-auto py-4">
                  <nav className="space-y-1.5 px-3">
                    <SidebarItem icon="fa-house" label="ড্যাশবোর্ড" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setSidebarOpen(false);}} />
                    {currentUser.role === 'admin' && <SidebarItem icon="fa-users" label="স্টাফ প্রোফাইল" active={currentView === 'employees'} onClick={() => {setCurrentView('employees'); setSidebarOpen(false);}} />}
                    
                    {(currentUser.role === 'admin' || currentUser.canSubmitAttendance) && <SidebarItem icon="fa-user-check" label="উপস্থিতি" active={currentView === 'attendance'} hasNew={user.role==='admin' && hasNewAttendance} onClick={() => {setCurrentView('attendance'); setSidebarOpen(false);}} />}
                    
                    <SidebarItem icon="fa-calendar-day" label="ছুটি" active={currentView === 'leave'} hasNew={user.role==='admin' && hasNewLeave} onClick={() => {setCurrentView('leave'); setSidebarOpen(false);}} />
                    
                    {(currentUser.role === 'admin' || currentUser.canSubmitExp !== false || currentUser.canApproveExp) && <SidebarItem icon="fa-money-bill-wave" label="যাতায়াত ও বিল" active={currentView === 'expenses'} hasNew={user.role==='admin' && hasNewExp} onClick={() => {setCurrentView('expenses'); setSidebarOpen(false);}} />}
                    
                    {(currentUser.role === 'admin' || currentUser.canSubmitIncome) && <SidebarItem icon="fa-money-bill-trend-up" label="আয় (Income)" active={currentView === 'incomes'} hasNew={user.role==='admin' && hasNewIncome} onClick={() => {setCurrentView('incomes'); setSidebarOpen(false);}} />}

                    {(currentUser.role === 'admin' || currentUser.canViewReports) && <SidebarItem icon="fa-file-lines" label="ডেইলি রিপোর্ট" active={currentView === 'reports'} hasNew={user.role==='admin' && hasNewReport} onClick={() => {setCurrentView('reports'); setSidebarOpen(false);}} />}
                    
                    <SidebarItem icon="fa-sack-dollar" label="বেতন" active={currentView === 'salary'} onClick={() => {setCurrentView('salary'); setSidebarOpen(false);}} />
                    <SidebarItem icon="fa-wallet" label="পেমেন্ট" active={currentView === 'payments'} hasNew={user.role==='admin' && hasNewPayment} onClick={() => {setCurrentView('payments'); setSidebarOpen(false);}} />
                    
                    {(currentUser.role === 'admin' || currentUser.canInvest) && <SidebarItem icon="fa-chart-line" label="ইনভেস্টমেন্ট" active={currentView === 'investments'} hasNew={user.role==='admin' && hasNewInvestment} onClick={() => {setCurrentView('investments'); setSidebarOpen(false);}} />}
                    
                    {/* 🌐 Website Management Menu */}
                    {(currentUser.role === 'admin' || currentUser.canManageWebsite) && <SidebarItem icon="fa-globe" label="ওয়েবসাইট কন্ট্রোল" active={currentView === 'website'} hasNew={user.role==='admin' && hasNewWeb} onClick={() => {setCurrentView('website'); setSidebarOpen(false);}} />}

                    {currentUser.role === 'admin' && <SidebarItem icon="fa-clipboard-list" label="লগ" active={currentView === 'logs'} onClick={() => {setCurrentView('logs'); setSidebarOpen(false);}} />}
                  </nav>
                </div>
                
                <div className="p-4 border-t border-slate-700 bg-[#0f172a]/50">
                   <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-500/10 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-colors font-semibold"><i className="fa-solid fa-power-off"></i> লগআউট</button>
                </div>
              </div>

              <div className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="hidden md:flex h-16 bg-[#0f172a] text-white items-center justify-between px-6 shrink-0 shadow-md z-10">
                  <div className="flex items-center space-x-2 text-sm text-blue-300"><i className="fa-solid fa-house text-xs"></i> <span>›</span> <span className="text-blue-100 font-medium capitalize">{currentView === 'employees' ? 'স্টাফ প্রোফাইল' : currentView === 'attendance' ? 'উপস্থিতি' : currentView === 'leave' ? 'ছুটি' : currentView === 'expenses' ? 'যাতায়াত ও অন্যান্য বিল' : currentView === 'incomes' ? 'আয় (Income)' : currentView === 'reports' ? 'ডেইলি রিপোর্ট' : currentView === 'salary' ? 'বেতন' : currentView === 'payments' ? 'পেমেন্ট' : currentView === 'investments' ? 'ইনভেস্টমেন্ট' : currentView === 'website' ? 'ওয়েবসাইট কন্ট্রোল' : currentView === 'logs' ? 'লগ' : 'ড্যাশবোর্ড'}</span></div>
                  <div className="flex items-center space-x-5">
                    <div className="flex items-center space-x-3 pl-5">
                      <div className="text-right"><p className="text-sm font-medium text-blue-50 leading-tight">{currentUser.name}</p><p className="text-xs text-blue-400 capitalize">{currentUser.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                      {currentUser.avatar ? <img src={currentUser.avatar} className="w-9 h-9 rounded-full border-2 border-blue-500 object-cover" /> : <div className="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold text-sm shadow">{currentUser.name.charAt(0)}</div>}
                    </div>
                  </div>
                </header>

                <header className="md:hidden h-14 bg-[#0f172a] text-white flex items-center justify-between px-4 shrink-0 shadow-md z-10">
                  <div className="flex items-center gap-2"><img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Logo" className="h-6 object-contain bg-white rounded px-1" /><span className="font-bold text-blue-100 capitalize">{currentView === 'employees' ? 'স্টাফ' : currentView === 'attendance' ? 'উপস্থিতি' : currentView === 'leave' ? 'ছুটি' : currentView === 'expenses' ? 'বিল' : currentView === 'incomes' ? 'আয়' : currentView === 'reports' ? 'রিপোর্ট' : currentView === 'salary' ? 'বেতন' : currentView === 'payments' ? 'পেমেন্ট' : currentView === 'investments' ? 'ইনভেস্টমেন্ট' : currentView === 'website' ? 'ওয়েবসাইট কন্ট্রোল' : currentView === 'logs' ? 'লগ' : 'ড্যাশবোর্ড'}</span></div>
                </header>

                <main className="flex-1 overflow-x-hidden overflow-y-auto bg-[#e2e8f0] p-4 pb-24 md:pb-6 sm:p-6 lg:p-8">
                  <div className="max-w-7xl mx-auto">
                    {currentView === 'dashboard' && <DashboardView user={currentUser} updateUser={updateUserProfile} />}
                    {currentView === 'attendance' && (currentUser.role === 'admin' || currentUser.canSubmitAttendance) && <AttendanceView user={currentUser} attendances={attendances} addAttendance={addAttendanceWithLog} users={users} showAlert={showAlert} logAction={logAction} />}
                    {currentView === 'leave' && <LeaveView user={currentUser} leaves={leaves} addLeave={addLeaveWithLog} updateLeave={updateLeave} deleteLeave={deleteLeave} showConfirm={showConfirm} logAction={logAction} />}
                    {currentView === 'expenses' && (currentUser.role === 'admin' || currentUser.canSubmitExp !== false || currentUser.canApproveExp) && <ExpenseView user={currentUser} expenses={expenses} addExpense={addExpenseWithLog} updateExpense={updateExpense} deleteExpense={deleteExpense} showConfirm={showConfirm} showPrompt={showPrompt} showAlert={showAlert} logAction={logAction} />}
                    
                    {/* 🟢 New Income View */}
                    {currentView === 'incomes' && (currentUser.role === 'admin' || currentUser.canSubmitIncome) && <IncomeView user={currentUser} incomes={incomes} addIncome={addIncomeWithLog} updateIncome={updateIncome} deleteIncome={deleteIncome} showConfirm={showConfirm} showAlert={showAlert} logAction={logAction} />}

                    {currentView === 'reports' && (currentUser.role === 'admin' || currentUser.canViewReports) && <ReportView user={currentUser} reports={reports} addReport={addReportWithLog} deleteReport={deleteReport} showConfirm={showConfirm} showAlert={showAlert} logAction={logAction} />}
                    {currentView === 'salary' && <SalaryView user={currentUser} users={users} salaries={salaries} addSalary={addSalaryWithLog} updateSalary={updateSalary} deleteSalary={deleteSalary} showAlert={showAlert} showConfirm={showConfirm} logAction={logAction} />}
                    {currentView === 'employees' && currentUser.role === 'admin' && <EmployeesView users={users} addUser={addUserWithLog} updateUser={updateUser} deleteUser={deleteUser} showConfirm={showConfirm} showAlert={showAlert} logAction={logAction} />}
                    {currentView === 'payments' && <PaymentsView user={currentUser} payments={payments} addPayment={addPaymentWithLog} deletePayment={deletePayment} users={users} expenses={expenses} showAlert={showAlert} showConfirm={showConfirm} logAction={logAction} />}
                    {currentView === 'investments' && (currentUser.role === 'admin' || currentUser.canInvest) && <InvestView user={currentUser} investments={investments} addInvestment={addInvestmentWithLog} updateInvestment={updateInvestment} deleteInvestment={deleteInvestment} showConfirm={showConfirm} showAlert={showAlert} logAction={logAction} />}
                    
                    {/* 🌐 Website Settings View */}
                    {currentView === 'website' && (currentUser.role === 'admin' || currentUser.canManageWebsite) && <WebsiteSettingsView config={webConfig[0] || {id: 1, adsStatus: false, popupUrl: '', banners: []}} updateConfig={updateConfig} packages={packages} addPackage={addPackage} updatePackage={updatePackage} deletePackage={deletePackage} complaints={complaints} deleteComplaint={deleteComplaint} reviews={reviews} updateReview={updateReview} deleteReview={deleteReview} showAlert={showAlert} showConfirm={showConfirm} logAction={logAction} />}

                    {currentView === 'logs' && currentUser.role === 'admin' && <LogsView logs={logs} />}
                  </div>
                </main>

                <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe pt-1 flex justify-around items-center h-[68px] z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-2xl">
                  <BottomNavItem icon="fa-house" label="ড্যাশবোর্ড" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                  
                  {(currentUser.role === 'admin' || currentUser.canSubmitAttendance) && (
                    <BottomNavItem icon="fa-user-check" label="উপস্থিতি" active={currentView === 'attendance'} hasNew={user.role==='admin' && hasNewAttendance} onClick={() => setCurrentView('attendance')} />
                  )}
                  
                  <div className="relative -top-5">
                    <button onClick={() => setCurrentView((currentUser.role === 'admin' || currentUser.canSubmitIncome) ? 'incomes' : 'expenses')} className="w-14 h-14 bg-gradient-to-r from-[#2d1960] to-[#5e3186] rounded-full flex flex-col items-center justify-center text-white shadow-lg shadow-purple-500/40 border-4 border-[#e2e8f0] active:scale-95 transition-transform"><i className={`fa-solid ${(currentUser.role === 'admin' || currentUser.canSubmitIncome) ? 'fa-money-bill-trend-up' : 'fa-money-bill-wave'} text-xl`}></i></button>
                    {user.role === 'admin' && hasNewIncome && <span className="absolute right-0 top-0 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>}
                  </div>
                  
                  <BottomNavItem icon="fa-sack-dollar" label="বেতন" active={currentView === 'salary'} onClick={() => setCurrentView('salary')} />
                  <BottomNavItem icon="fa-bars" label="মেনু" active={sidebarOpen} onClick={() => setSidebarOpen(true)} />
                </nav>
              </div>
            </div>
          );
        }

        // ==========================================
        // 🔵 COMPONENTS
        // ==========================================
        
        function DialogBox({ dialog, setDialog }) {
          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in-up text-center">
                  <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 ${dialog.type === 'alert' ? 'bg-red-100 text-red-500' : dialog.type === 'confirm' ? 'bg-orange-100 text-orange-500' : 'bg-blue-100 text-blue-500'}`}>
                      <i className={`fa-solid text-3xl ${dialog.type === 'alert' ? 'fa-triangle-exclamation' : dialog.type === 'confirm' ? 'fa-question' : 'fa-info'}`}></i>
                  </div>
                  <h3 className="text-lg font-bold text-slate-800 mb-4">{dialog.msg}</h3>
                  {dialog.type === 'prompt' && (
                      <input type="text" autoFocus value={dialog.inputVal} onChange={e => setDialog({...dialog, inputVal: e.target.value})} className="w-full border border-slate-300 p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="এখানে লিখুন..." />
                  )}
                  <div className="flex justify-center gap-3 mt-4">
                      {dialog.type === 'confirm' && <button onClick={() => setDialog({open: false})} className="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition">বাতিল</button>}
                      <button onClick={() => { dialog.action && dialog.action(dialog.inputVal); setDialog({open: false}); }} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">ঠিক আছে</button>
                  </div>
              </div>
            </div>
          );
        }

        function SidebarItem({ icon, label, active, onClick, hasNew }) {
          return (
            <button onClick={onClick} className={`relative w-full flex items-center px-4 py-3.5 mb-1.5 text-sm rounded-xl transition-all duration-200 font-bold ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
              <i className={`fa-solid ${icon} w-6 text-center mr-3 text-lg ${active ? 'text-white' : 'text-blue-400'}`}></i> {label}
              {hasNew && <span className="absolute right-4 top-1/2 -translate-y-1/2 w-2 h-2 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></span>}
            </button>
          );
        }

        function BottomNavItem({ icon, label, active, onClick, hasNew }) {
          return (
            <button onClick={onClick} className={`relative flex flex-col items-center justify-center w-16 h-full transition-colors ${active ? 'text-blue-600' : 'text-slate-400'}`}>
              <i className={`fa-solid ${icon} text-xl mb-1 ${active ? 'animate-bounce-short' : ''}`}></i><span className={`text-[10px] font-semibold tracking-wide ${active ? 'font-bold' : ''}`}>{label}</span>
              {hasNew && <span className="absolute right-4 top-2 w-2 h-2 bg-red-500 rounded-full"></span>}
            </button>
          );
        }

        function DashboardView({ user, updateUser }) {
          const handleAvatarUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => updateUser({ ...user, avatar: reader.result });
              reader.readAsDataURL(file);
            }
          };

          return (
            <div className="space-y-6">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col relative group">
                <div className="bg-gradient-to-r from-[#1e293b] to-[#0f172a] h-24 md:h-32 relative flex justify-center">
                   <div className="absolute -bottom-10 md:-bottom-12 w-24 h-24 md:w-28 md:h-28 bg-white rounded-2xl md:rounded-xl border-4 border-white overflow-hidden flex items-center justify-center shadow-lg group">
                      {user.avatar ? <img src={user.avatar} alt="Profile" className="w-full h-full object-cover" /> : <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1e293b&color=fff&size=120`} alt="Profile" />}
                      <label className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center cursor-pointer text-white flex-col transition-all"><i className="fa-solid fa-camera text-xl"></i><input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" /></label>
                   </div>
                </div>
                <div className="pt-14 md:pt-16 pb-5 md:pb-6 text-center border-b border-slate-100 px-4">
                  <h3 className="text-xl md:text-2xl font-bold text-slate-800">{user.name}</h3><p className="text-sm text-slate-500 mt-0.5">{user.loginId}</p>
                </div>
                <div className="p-4 md:p-5 flex-1 bg-slate-50/50">
                  <div className="grid grid-cols-2 gap-3 text-sm">
                    <div className="flex flex-col text-slate-700 bg-white p-3 md:p-4 rounded-xl border border-slate-100 shadow-sm items-center text-center"><i className="fa-solid fa-briefcase text-blue-500 mb-2 text-lg"></i><p className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">পদবী</p><p className="font-bold text-xs md:text-sm">{user.designation}</p></div>
                    <div className="flex flex-col text-slate-700 bg-white p-3 md:p-4 rounded-xl border border-slate-100 shadow-sm items-center text-center"><i className="fa-solid fa-shield-halved text-blue-500 mb-2 text-lg"></i><p className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">রোল</p><p className="font-bold text-xs md:text-sm capitalize">{user.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden"><div className="bg-blue-600 text-white p-3 text-center font-bold text-lg md:text-xl"><RealTimeClock /></div><div className="flex-1 flex items-center justify-center p-6 bg-slate-50"><AnalogClock /></div></div>
                <div className="bg-[#1e293b] text-white rounded-2xl shadow-lg p-5 md:p-6 border border-slate-700 overflow-hidden"><MiniCalendar /></div>
              </div>
            </div>
          );
        }

        function IncomeView({ user, incomes, addIncome, updateIncome, deleteIncome, showConfirm, showAlert, logAction }) {
            const [editingId, setEditingId] = useState(null);
            const [amount, setAmount] = useState('');
            const [source, setSource] = useState('Product Sales');
            const [details, setDetails] = useState('');
            const [incDate, setIncDate] = useState(() => formatDateISO(new Date()));
            
            const [filterMonth, setFilterMonth] = useState(() => {
                const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            });

            const submitIncome = (e) => {
                e.preventDefault();
                if(editingId) {
                    updateIncome(editingId, { amount: parseFloat(amount), source, details, date: incDate });
                    logAction(`Updated income ${editingId}`);
                    setEditingId(null); showAlert('আয় আপডেট হয়েছে!');
                } else {
                    addIncome({ id: Date.now(), userId: user.id, userName: user.name, amount: parseFloat(amount), source, details, date: incDate, timestamp: getCurrentTimeStr() });
                    showAlert('আয় সফলভাবে যুক্ত হয়েছে!');
                }
                setAmount(''); setDetails(''); setIncDate(formatDateISO(new Date()));
            };

            const handleEdit = (inc) => {
                setEditingId(inc.id); setAmount(inc.amount); setSource(inc.source); setDetails(inc.details); setIncDate(inc.date);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Calculations based on filterMonth
            const filteredIncomes = incomes.filter(i => i.date && i.date.startsWith(filterMonth));
            const totalIncome = filteredIncomes.reduce((sum, i) => sum + (i.amount || 0), 0);
            
            const sourceTotals = {
                'CCTV Work': 0, 'Product Sales': 0, 'Digital Marketing': 0, 'Graphics Design': 0, 'অন্যান্য (Others)': 0
            };
            filteredIncomes.forEach(i => {
                if(sourceTotals[i.source] !== undefined) sourceTotals[i.source] += i.amount;
                else sourceTotals['অন্যান্য (Others)'] += i.amount;
            });

            return (
                <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-100 pb-4 gap-4">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <i className="fa-solid fa-money-bill-trend-up text-green-600"></i> মাসিক আয়
                        </h2>
                        <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
                            <label className="text-xs font-bold text-slate-600">মাস নির্বাচন:</label>
                            <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent text-sm font-bold text-blue-700 outline-none cursor-pointer" />
                        </div>
                    </div>

                    {/* Dashboard Cards */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-green-50 border border-green-200 p-6 rounded-2xl shadow-sm relative overflow-hidden flex flex-col justify-center">
                            <i className="fa-solid fa-sack-dollar absolute -right-6 -bottom-6 text-green-500/20 text-9xl"></i>
                            <p className="text-green-800 text-sm font-bold uppercase mb-2">এই মাসের মোট আয়</p>
                            <p className="text-4xl md:text-5xl font-black text-green-600">৳{totalIncome.toLocaleString()}</p>
                        </div>
                        <div className="lg:col-span-2 bg-slate-50 border border-slate-200 p-6 rounded-2xl shadow-sm">
                            <h4 className="text-sm font-bold text-slate-600 uppercase mb-4 border-b pb-2">খাতভিত্তিক আয় (Source Breakdown)</h4>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-500 font-bold mb-1">CCTV Work</p><p className="font-bold text-slate-800 text-lg">৳{sourceTotals['CCTV Work'].toLocaleString()}</p></div>
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-500 font-bold mb-1">Product Sales</p><p className="font-bold text-slate-800 text-lg">৳{sourceTotals['Product Sales'].toLocaleString()}</p></div>
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-500 font-bold mb-1">Digital Mkt.</p><p className="font-bold text-slate-800 text-lg">৳{sourceTotals['Digital Marketing'].toLocaleString()}</p></div>
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-500 font-bold mb-1">Graphics Design</p><p className="font-bold text-slate-800 text-lg">৳{sourceTotals['Graphics Design'].toLocaleString()}</p></div>
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-500 font-bold mb-1">অন্যান্য</p><p className="font-bold text-slate-800 text-lg">৳{sourceTotals['অন্যান্য (Others)'].toLocaleString()}</p></div>
                            </div>
                        </div>
                    </div>

                    {/* Add Income Form */}
                    <form onSubmit={submitIncome} className="bg-blue-50/50 p-5 md:p-6 rounded-2xl border border-blue-100 grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-5 items-end">
                        <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">তারিখ</label><input type="date" required value={incDate} onChange={e=>setIncDate(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white" /></div>
                        <div>
                            <label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">আয়ের উৎস (Source)</label>
                            <select value={source} onChange={e=>setSource(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="Product Sales">Product Sales</option>
                                <option value="CCTV Work">CCTV Work</option>
                                <option value="Digital Marketing">Digital Marketing</option>
                                <option value="Graphics Design">Graphics Design</option>
                                <option value="অন্যান্য (Others)">অন্যান্য (Others)</option>
                            </select>
                        </div>
                        <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" required value={amount} onChange={e=>setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00" /></div></div>
                        <div className="md:col-span-3"><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">বিস্তারিত বিবরণ (Optional)</label><input value={details} onChange={e=>setDetails(e.target.value)} className="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="কাস্টমারের নাম বা অন্যান্য বিবরণ লিখুন..." /></div>
                        
                        <div className="md:col-span-4 mt-2 flex gap-3">
                            <button type="submit" className="w-full md:w-auto bg-green-600 text-white px-8 py-3.5 rounded-xl hover:bg-green-700 font-bold shadow-lg active:scale-95 transition-all"><i className={`fa-solid ${editingId ? 'fa-check' : 'fa-plus'} mr-2`}></i> {editingId ? 'আপডেট করুন' : 'আয় এন্ট্রি করুন'}</button>
                            {editingId && <button type="button" onClick={()=>{setEditingId(null); setAmount(''); setDetails('');}} className="px-6 py-3.5 rounded-xl bg-slate-200 text-slate-700 font-bold hover:bg-slate-300 transition-all">বাতিল</button>}
                        </div>
                    </form>

                    {/* Income History Table */}
                    <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                        <table className="w-full text-left border-collapse">
                            <thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th><th className="p-4 font-bold">এন্ট্রি করেছেন</th><th className="p-4 font-bold">উৎস</th><th className="p-4 font-bold">বিবরণ</th><th className="p-4 font-bold text-right">পরিমাণ</th>{user.role === 'admin' && <th className="p-4 font-bold text-center">অ্যাকশন</th>}</tr></thead>
                            <tbody className="divide-y divide-slate-100">{filteredIncomes.length === 0 ? <tr><td colSpan={user.role === 'admin' ? 6 : 5} className="p-8 text-center text-slate-400 font-medium">এই মাসে কোনো রেকর্ড পাওয়া যায়নি</td></tr> : filteredIncomes.map(inc => (<tr key={inc.id} className="hover:bg-slate-50 transition"><td className="p-4 text-slate-500 font-medium">{formatDateEn(new Date(inc.date))}</td><td className="p-4 font-bold text-slate-800">{inc.userName}</td><td className="p-4"><span className="bg-blue-50 text-blue-600 border border-blue-100 px-2 py-1 rounded text-xs font-bold">{inc.source}</span></td><td className="p-4 text-slate-600 text-sm">{inc.details || '-'}</td><td className="p-4 font-black text-green-600 text-lg text-right">৳ {inc.amount.toLocaleString()}</td>{user.role === 'admin' && <td className="p-4 text-center space-x-2"><button onClick={() => handleEdit(inc)} className="bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-pen text-sm"></i></button><button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteIncome(inc.id); logAction(`Deleted income ${inc.id}`); })} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-trash-can text-sm"></i></button></td>}</tr>))}</tbody>
                        </table>
                    </div>
                    <div className="md:hidden grid grid-cols-1 gap-3">
                        {filteredIncomes.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">এই মাসে কোনো রেকর্ড পাওয়া যায়নি</div> : filteredIncomes.map(inc => (
                        <div key={inc.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col relative">
                            {user.role === 'admin' && <div className="absolute top-4 right-4 flex gap-2"><button onClick={() => handleEdit(inc)} className="text-blue-400 hover:text-blue-600 p-2"><i className="fa-solid fa-pen"></i></button><button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteIncome(inc.id); logAction(`Deleted income ${inc.id}`); })} className="text-red-400 hover:text-red-600 p-2"><i className="fa-solid fa-trash-can"></i></button></div>}
                            <div className="mb-2 pr-16"><div className="text-xs text-slate-500 mb-1.5"><i className="fa-regular fa-calendar mr-1"></i> {formatDateEn(new Date(inc.date))} (By: {inc.userName})</div><span className="bg-blue-50 text-blue-600 border border-blue-100 text-[10px] font-bold px-2 py-0.5 rounded-md mb-2 inline-block">{inc.source}</span><div className="text-sm text-slate-700 leading-tight">{inc.details}</div></div>
                            <div className="font-black text-green-600 text-xl mt-2 border-t border-slate-100 pt-2 text-right">৳{inc.amount.toLocaleString()}</div>
                        </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 🔵 WEBSITE MANAGEMENT COMPONENT
        // ==========================================
        function WebsiteSettingsView({ config, updateConfig, packages, addPackage, updatePackage, deletePackage, complaints, deleteComplaint, reviews, updateReview, deleteReview, showAlert, showConfirm, logAction }) {
            const [activeTab, setActiveTab] = useState('general');
            
            // General Settings State
            const [adsStatus, setAdsStatus] = useState(config.adsStatus || false);
            const [popupUrl, setPopupUrl] = useState(config.popupUrl || '');
            const [newBanner, setNewBanner] = useState('');

            // Package State
            const [pkgName, setPkgName] = useState('');
            const [pkgSpeed, setPkgSpeed] = useState('');
            const [pkgPrice, setPkgPrice] = useState('');
            const [pkgFeatures, setPkgFeatures] = useState('');

            const saveGeneralSettings = () => {
                updateConfig(1, { ...config, adsStatus, popupUrl });
                logAction('Updated Website General Settings');
                showAlert('সেটিংস সফলভাবে সেভ হয়েছে!');
            };

            const addBanner = () => {
                if(!newBanner) return;
                const updatedBanners = [...(config.banners || []), newBanner];
                updateConfig(1, { ...config, banners: updatedBanners });
                setNewBanner('');
                logAction('Added new website banner');
                showAlert('ব্যানার যুক্ত হয়েছে!');
            };

            const removeBanner = (index) => {
                const updatedBanners = [...config.banners];
                updatedBanners.splice(index, 1);
                updateConfig(1, { ...config, banners: updatedBanners });
                logAction('Removed website banner');
            };

            const submitPackage = (e) => {
                e.preventDefault();
                addPackage({
                    id: Date.now(),
                    name: pkgName,
                    speed: pkgSpeed,
                    price: parseFloat(pkgPrice),
                    features: pkgFeatures.split(',').map(f => f.trim())
                });
                setPkgName(''); setPkgSpeed(''); setPkgPrice(''); setPkgFeatures('');
                logAction(`Added broadband package: ${pkgName}`);
                showAlert('নতুন প্যাকেজ যুক্ত হয়েছে!');
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
                    <div className="bg-gradient-to-r from-[#2d1960] to-[#5e3186] p-6 text-white">
                        <h2 className="text-2xl font-bold flex items-center gap-3"><i className="fa-solid fa-globe text-purple-300"></i> ওয়েবসাইট কন্ট্রোল প্যানেল</h2>
                        <p className="text-purple-200 text-sm mt-1">পাবলিক ওয়েবসাইট gotiexpress.com এর ডিজাইন ও ডেটা এখান থেকে নিয়ন্ত্রণ করুন</p>
                    </div>

                    <div className="flex overflow-x-auto bg-slate-50 border-b border-slate-200 scrollbar-hide">
                        <button onClick={()=>setActiveTab('general')} className={`px-6 py-4 text-sm font-bold whitespace-nowrap transition-colors border-b-2 ${activeTab === 'general' ? 'border-[#5e3186] text-[#2d1960]' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-gear mr-2"></i> ব্যানার ও অ্যাডস</button>
                        <button onClick={()=>setActiveTab('packages')} className={`px-6 py-4 text-sm font-bold whitespace-nowrap transition-colors border-b-2 ${activeTab === 'packages' ? 'border-[#5e3186] text-[#2d1960]' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-wifi mr-2"></i> প্যাকেজ সমূহ</button>
                        <button onClick={()=>setActiveTab('complaints')} className={`px-6 py-4 text-sm font-bold whitespace-nowrap transition-colors border-b-2 ${activeTab === 'complaints' ? 'border-[#5e3186] text-[#2d1960]' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-triangle-exclamation mr-2"></i> অভিযোগ বক্স</button>
                        <button onClick={()=>setActiveTab('reviews')} className={`px-6 py-4 text-sm font-bold whitespace-nowrap transition-colors border-b-2 ${activeTab === 'reviews' ? 'border-[#5e3186] text-[#2d1960]' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-star mr-2"></i> কাস্টমার রিভিউ</button>
                    </div>

                    <div className="p-6 md:p-8">
                        {activeTab === 'general' && (
                            <div className="space-y-10 animate-fade-in-up">
                                <div>
                                    <h3 className="text-lg font-bold text-[#2d1960] mb-4 border-b border-purple-100 pb-2"><i className="fa-solid fa-bullhorn mr-2 text-[#5e3186]"></i> পপ-আপ অ্যাডস (Popup Ads)</h3>
                                    <div className="bg-purple-50 border border-purple-100 p-5 rounded-2xl flex flex-col md:flex-row gap-5 items-start md:items-center">
                                        <div className="flex-1 w-full">
                                            <label className="block text-sm font-bold text-slate-700 mb-2">অ্যাডের ছবির লিংক (URL)</label>
                                            <input type="text" value={popupUrl} onChange={e=>setPopupUrl(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none" placeholder="https://image-link.jpg" />
                                        </div>
                                        <div className="flex items-center gap-3 bg-white p-3 border border-slate-200 rounded-xl">
                                            <span className="text-sm font-bold text-slate-700">স্ট্যাটাস:</span>
                                            <label className="relative inline-flex items-center cursor-pointer">
                                              <input type="checkbox" checked={adsStatus} onChange={e=>setAdsStatus(e.target.checked)} className="sr-only peer" />
                                              <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                                              <span className={`ml-3 text-sm font-bold ${adsStatus ? 'text-green-600' : 'text-slate-500'}`}>{adsStatus ? 'ON' : 'OFF'}</span>
                                            </label>
                                        </div>
                                        <button onClick={saveGeneralSettings} className="w-full md:w-auto bg-[#2d1960] text-white px-8 py-3 rounded-xl font-bold hover:bg-[#5e3186] transition-colors whitespace-nowrap shadow-md">সেভ সেটিংস</button>
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-lg font-bold text-[#2d1960] mb-4 border-b border-purple-100 pb-2"><i className="fa-solid fa-images mr-2 text-[#5e3186]"></i> হোমপেজ স্লাইডার ব্যানার</h3>
                                    <div className="flex flex-col md:flex-row gap-3 mb-6">
                                        <input type="text" value={newBanner} onChange={e=>setNewBanner(e.target.value)} className="flex-1 border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none" placeholder="ব্যানার ইমেজের লিংক (URL) দিন" />
                                        <button onClick={addBanner} className="bg-[#5e3186] text-white px-6 py-3 rounded-xl font-bold hover:bg-[#2d1960] transition-colors"><i className="fa-solid fa-plus mr-2"></i> ব্যানার যোগ করুন</button>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {(!config.banners || config.banners.length === 0) && <p className="text-slate-500 text-sm">কোনো ব্যানার যুক্ত করা নেই। ডিফল্ট কালার ওয়েবসাইটের হোমপেজে দেখাবে।</p>}
                                        {config.banners?.map((url, i) => (
                                            <div key={i} className="relative rounded-2xl overflow-hidden border border-slate-200 shadow-sm group aspect-video bg-slate-100">
                                                <img src={url} alt={`Banner ${i+1}`} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                    <button onClick={() => showConfirm('ব্যানারটি মুছে ফেলতে চান?', () => removeBanner(i))} className="bg-red-500 text-white w-10 h-10 rounded-full hover:scale-110 transition-transform"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'packages' && (
                            <div className="animate-fade-in-up">
                                <form onSubmit={submitPackage} className="bg-purple-50 p-6 rounded-2xl border border-purple-100 mb-8 grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
                                    <div><label className="block text-xs font-bold text-slate-700 mb-2">প্যাকেজের নাম</label><input required value={pkgName} onChange={e=>setPkgName(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none bg-white" placeholder="e.g. Basic Plan" /></div>
                                    <div><label className="block text-xs font-bold text-slate-700 mb-2">স্পিড (Mbps)</label><input required value={pkgSpeed} onChange={e=>setPkgSpeed(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none bg-white" placeholder="e.g. 5 Mbps" /></div>
                                    <div><label className="block text-xs font-bold text-slate-700 mb-2">মূল্য (৳)</label><input type="number" required value={pkgPrice} onChange={e=>setPkgPrice(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none bg-white" placeholder="e.g. 500" /></div>
                                    <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-700 mb-2">সুবিধাসমূহ (কমা দিয়ে লিখুন)</label><input required value={pkgFeatures} onChange={e=>setPkgFeatures(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-[#5e3186] outline-none bg-white" placeholder="e.g. YouTube Free, BDIX, 24/7 Support" /></div>
                                    <button type="submit" className="bg-[#2d1960] text-white p-3 rounded-xl font-bold hover:bg-[#5e3186] transition-colors"><i className="fa-solid fa-plus mr-2"></i> প্যাকেজ যোগ করুন</button>
                                </form>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {packages.length === 0 ? <p className="text-slate-500">কোনো প্যাকেজ নেই।</p> : packages.map(pkg => (
                                        <div key={pkg.id} className="bg-white border-2 border-slate-100 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#2d1960] to-[#5e3186]"></div>
                                            <button onClick={() => showConfirm('প্যাকেজটি মুছে ফেলতে চান?', () => {deletePackage(pkg.id); logAction(`Deleted pkg ${pkg.name}`);})} className="absolute top-4 right-4 text-red-300 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                            <h3 className="text-xl font-bold text-slate-800">{pkg.name}</h3>
                                            <div className="text-3xl font-black text-[#5e3186] my-2">{pkg.speed}</div>
                                            <div className="text-lg font-bold text-slate-600 mb-4">৳ {pkg.price} <span className="text-sm font-normal">/মাস</span></div>
                                            <ul className="space-y-2 mb-4 text-sm text-slate-600">
                                                {pkg.features.map((f, i) => <li key={i}><i className="fa-solid fa-circle-check text-green-500 mr-2"></i> {f}</li>)}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'complaints' && (
                            <div className="animate-fade-in-up">
                                <div className="space-y-4">
                                    {complaints.length === 0 ? <div className="p-8 text-center text-slate-500 bg-slate-50 rounded-2xl border border-dashed">কোনো অভিযোগ নেই।</div> : complaints.map(c => (
                                        <div key={c.id} className="bg-white p-5 rounded-2xl border border-red-100 shadow-sm relative pl-16">
                                            <div className="absolute left-5 top-5 w-8 h-8 bg-red-100 text-red-500 rounded-full flex items-center justify-center"><i className="fa-solid fa-triangle-exclamation"></i></div>
                                            <button onClick={() => showConfirm('অভিযোগটি মুছে ফেলতে চান?', () => deleteComplaint(c.id))} className="absolute top-4 right-4 text-slate-300 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                            <div className="flex justify-between items-center mb-2 pr-8">
                                                <h4 className="font-bold text-slate-800">{c.name} <span className="text-xs text-slate-400 font-normal ml-2">{c.date}</span></h4>
                                                <a href={`tel:${c.phone}`} className="text-blue-600 bg-blue-50 px-3 py-1 rounded-lg text-xs font-bold"><i className="fa-solid fa-phone mr-1"></i> {c.phone}</a>
                                            </div>
                                            <p className="text-slate-600 text-sm whitespace-pre-wrap">{c.details}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'reviews' && (
                            <div className="animate-fade-in-up">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {reviews.length === 0 ? <div className="p-8 md:col-span-2 text-center text-slate-500 bg-slate-50 rounded-2xl border border-dashed">কোনো রিভিউ নেই।</div> : reviews.map(r => (
                                        <div key={r.id} className="bg-white p-5 rounded-2xl border border-yellow-100 shadow-sm relative">
                                            <button onClick={() => showConfirm('রিভিউটি মুছে ফেলতে চান?', () => deleteReview(r.id))} className="absolute top-4 right-4 text-slate-300 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                            <div className="flex items-center gap-1 text-yellow-400 text-sm mb-2">
                                                {[...Array(5)].map((_, i) => <i key={i} className={`fa-star ${i < r.rating ? 'fa-solid' : 'fa-regular text-slate-300'}`}></i>)}
                                            </div>
                                            <h4 className="font-bold text-slate-800 text-sm">{r.customerName} <span className="text-xs text-slate-400 font-normal ml-2">{r.date}</span></h4>
                                            <p className="text-slate-600 text-sm mt-2 italic">"{r.comment}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function LogsView({ logs }) {
            const [search, setSearch] = useState('');
            const filtered = search ? logs.filter(l => l.action.toLowerCase().includes(search.toLowerCase()) || l.userName.toLowerCase().includes(search.toLowerCase())) : logs;
            return (
                <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><i className="fa-solid fa-clipboard-list text-blue-500"></i> লগ</h2>
                    <div className="mb-4">
                        <input type="text" placeholder="সার্চ..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full md:w-1/2 border p-3 rounded-xl" />
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead><tr className="bg-slate-50 text-xs uppercase"><th className="p-2">Time</th><th className="p-2">User</th><th className="p-2">Action</th></tr></thead>
                            <tbody className="divide-y">
                                {filtered.map(l => (
                                    <tr key={l.id}>
                                        <td className="p-2 text-xs">{new Date(l.timestamp).toLocaleString('en-US')}</td>
                                        <td className="p-2 font-bold">{l.userName}</td>
                                        <td className="p-2 text-sm">{l.action}</td>
                                    </tr>
                                ))}
                                {filtered.length === 0 && <tr><td colSpan="3" className="p-4 text-center">কোনো লগ নেই</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Utilities (Clocks & Calendar)
        // ==========================================
        function RealTimeClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          return <span>{new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(time)}</span>;
        }

        function AnalogClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          const secDeg = time.getSeconds() * 6, minDeg = time.getMinutes() * 6 + time.getSeconds() * 0.1, hrDeg = (time.getHours() % 12) * 30 + time.getMinutes() * 0.5;
          return (
            <div className="relative w-[150px] h-[150px] md:w-48 md:h-48 rounded-full border-[6px] border-slate-200 shadow-[inset_0_2px_15px_rgba(0,0,0,0.1)] bg-white flex items-center justify-center">
              <span className="absolute top-2 text-xs md:text-sm font-bold text-slate-400">12</span><span className="absolute right-3 text-xs md:text-sm font-bold text-slate-400">3</span><span className="absolute bottom-2 text-xs md:text-sm font-bold text-slate-400">6</span><span className="absolute left-3 text-xs md:text-sm font-bold text-slate-400">9</span>
              <div className="absolute w-1 md:w-1.5 h-10 md:h-12 bg-slate-800 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${hrDeg}deg)` }}></div>
              <div className="absolute w-0.5 md:w-1 h-14 md:h-16 bg-blue-600 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${minDeg}deg)` }}></div>
              <div className="absolute w-[1px] md:w-0.5 h-16 md:h-20 bg-red-500 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${secDeg}deg)` }}></div>
              <div className="w-3 h-3 md:w-4 md:h-4 bg-slate-800 border-2 border-white rounded-full z-10 absolute shadow-sm"></div>
            </div>
          );
        }

        function MiniCalendar() {
          const today = new Date();
          const monthYear = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(today);
          const daysInWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const year = today.getFullYear(), month = today.getMonth();
          const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
          
          return (
            <div className="w-full">
              <div className="flex justify-between items-center mb-4 md:mb-5 pb-3 border-b border-slate-600">
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-left"></i></button>
                <span className="text-lg md:text-xl font-bold tracking-wide">{monthYear}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-right"></i></button>
              </div>
              <div className="overflow-x-auto w-full pb-2 scrollbar-hide">
                <div className="grid grid-cols-7 gap-1 md:gap-2 text-center text-xs md:text-sm min-w-[240px]">
                  {daysInWeek.map(d => <div key={d} className="text-blue-400 font-bold py-1 text-[10px] md:text-xs uppercase">{d}</div>)}
                  {Array(firstDay).fill(null).map((_, i) => <div key={`blank-${i}`} className="py-1 md:py-2"></div>)}
                  {Array.from({length: daysInMonth}, (_, i) => i + 1).map(d => (
                    <div key={d} className={`py-1 md:py-1.5 rounded-lg flex items-center justify-center transition-colors ${d === today.getDate() ? 'bg-blue-500 text-white font-bold shadow-lg shadow-blue-500/40' : 'hover:bg-slate-700 text-slate-300'}`}>
                      {d}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
