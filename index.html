<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গতি এক্সপ্রেস - Goti Express</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; color: #1e293b; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #5e3186; border-radius: 10px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        .gradient-text {
            background: linear-gradient(to right, #2d1960, #5e3186);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBmJGTuAvMF9FM6MwOSi4BZqFmGyqb2Yd0",
            authDomain: "goti-express.firebaseapp.com",
            projectId: "goti-express",
            storageBucket: "goti-express.firebasestorage.app",
            messagingSenderId: "427378824805",
            appId: "1:427378824805:web:54373b156fc7f40f65588c"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 🌐 Public Database Hook (Read Only for Config, Packages. Write for Complaints, Reviews)
        function usePublicData() {
            const [webConfig, setWebConfig] = useState(null);
            const [packages, setPackages] = useState([]);
            const [reviews, setReviews] = useState([]);
            
            useEffect(() => {
                const unsubConfig = db.collection('websiteConfig').doc('1').onSnapshot(doc => {
                    if(doc.exists) setWebConfig(doc.data());
                });
                const unsubPackages = db.collection('packages').orderBy('price', 'asc').onSnapshot(snap => {
                    setPackages(snap.docs.map(d => d.data()));
                });
                const unsubReviews = db.collection('reviews').orderBy('id', 'desc').limit(10).onSnapshot(snap => {
                    setReviews(snap.docs.map(d => d.data()));
                });
                return () => { unsubConfig(); unsubPackages(); unsubReviews(); };
            }, []);

            const submitComplaint = (data) => db.collection('complaints').doc(data.id.toString()).set(data);
            const submitReview = (data) => db.collection('reviews').doc(data.id.toString()).set(data);
            
            return { webConfig, packages, reviews, submitComplaint, submitReview };
        }

        function App() {
            const { webConfig, packages, reviews, submitComplaint, submitReview } = usePublicData();
            const [showPopup, setShowPopup] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if(webConfig?.adsStatus && webConfig?.popupUrl) {
                    const timer = setTimeout(() => setShowPopup(true), 2000);
                    return () => clearTimeout(timer);
                } else {
                    setShowPopup(false);
                }
            }, [webConfig]);

            return (
                <div className="relative">
                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-40 transition-all duration-300 ${scrolled ? 'bg-white shadow-lg py-3' : 'bg-white/90 backdrop-blur-md py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={()=>window.scrollTo(0,0)}>
                                <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Goti Express" className="h-10" />
                                <span className="text-2xl font-bold text-[#2d1960] hidden md:block tracking-wide">গতি এক্সপ্রেস</span>
                            </div>
                            <div className="hidden lg:flex items-center gap-8 font-bold text-slate-600">
                                <a href="#home" className="hover:text-[#5e3186] transition">হোম</a>
                                <a href="#packages" className="hover:text-[#5e3186] transition">প্যাকেজ সমূহ</a>
                                <a href="#contact" className="hover:text-[#5e3186] transition">যোগাযোগ</a>
                            </div>
                            <div className="flex items-center gap-4">
                                <a href="https://portal.inetbills.com/" target="_blank" className="bg-gradient-to-r from-[#2d1960] to-[#5e3186] text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-purple-900/30 hover:shadow-purple-900/50 hover:-translate-y-0.5 transition-all">
                                    <i className="fa-solid fa-credit-card mr-2"></i> বিল পরিশোধ
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Popup Ad */}
                    {showPopup && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="relative bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl">
                                <button onClick={() => setShowPopup(false)} className="absolute top-3 right-3 bg-white text-slate-800 w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-md hover:bg-red-500 hover:text-white transition z-10"><i className="fa-solid fa-xmark"></i></button>
                                <img src={webConfig.popupUrl} alt="Advertisement" className="w-full h-auto object-contain" />
                            </div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <div id="home" className="relative pt-24 pb-12 lg:pt-32 lg:pb-20 overflow-hidden min-h-[80vh] flex items-center bg-[#f8fafc]">
                        {(!webConfig?.banners || webConfig.banners.length === 0) ? (
                            // Default Gradient Hero if no banner uploaded
                            <div className="absolute inset-0 bg-gradient-to-br from-[#2d1960] via-[#5e3186] to-[#2d1960] flex flex-col items-center justify-center text-white px-6 text-center">
                                <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" className="h-24 bg-white p-3 rounded-2xl mb-6 shadow-2xl" />
                                <h1 className="text-4xl md:text-6xl font-black mb-6 leading-tight">গতি এক্সপ্রেস <br/> ব্রডব্যান্ড ইন্টারনেট</h1>
                                <p className="text-lg md:text-2xl text-purple-100 max-w-2xl mb-10">নিরবচ্ছিন্ন ও সুপার ফাস্ট ইন্টারনেট স্পিড এখন আপনার হাতের মুঠোয়!</p>
                                <a href="#packages" className="bg-white text-[#2d1960] px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-100 transition shadow-xl"><i className="fa-solid fa-rocket mr-2"></i> প্যাকেজ সমূহ দেখুন</a>
                            </div>
                        ) : (
                            // Image Slider Hero
                            <HeroSlider banners={webConfig.banners} />
                        )}
                    </div>

                    {/* 24/7 Active Banner */}
                    <div className="bg-gradient-to-r from-[#2d1960] to-[#5e3186] py-4 text-white overflow-hidden shadow-inner">
                        <div className="max-w-7xl mx-auto px-6 flex justify-around items-center text-sm md:text-base font-bold">
                            <span className="flex items-center"><i className="fa-solid fa-headset mr-2 text-yellow-300 text-xl animate-pulse"></i> ২৪/৭ সাপোর্ট একটিভ</span>
                            <span className="flex items-center"><i className="fa-solid fa-bolt mr-2 text-yellow-300 text-xl"></i> সুপার ফাস্ট স্পিড</span>
                            <span className="hidden md:flex items-center"><i className="fa-solid fa-shield-halved mr-2 text-yellow-300 text-xl"></i> সম্পূর্ণ নিরাপদ নেটওয়ার্ক</span>
                        </div>
                    </div>

                    {/* Packages Section */}
                    <div id="packages" className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-16 animate-fade-in">
                                <h2 className="text-3xl md:text-4xl font-black text-[#2d1960] mb-4">আমাদের জনপ্রিয় ইন্টারনেট প্যাকেজ</h2>
                                <div className="w-24 h-1.5 bg-[#5e3186] mx-auto rounded-full"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {packages.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-500 p-10 bg-slate-50 rounded-2xl border border-dashed">শীঘ্রই নতুন প্যাকেজ আপডেট করা হবে।</div>
                                ) : (
                                    packages.map((pkg, i) => (
                                        <div key={pkg.id} className="bg-white rounded-3xl p-8 border-2 border-slate-100 shadow-lg hover:shadow-2xl hover:border-[#5e3186] hover:-translate-y-2 transition-all duration-300 relative overflow-hidden animate-fade-in" style={{animationDelay: `${i*100}ms`}}>
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-purple-100 to-transparent rounded-bl-full -z-10"></div>
                                            <h3 className="text-2xl font-bold text-slate-800 mb-2">{pkg.name}</h3>
                                            <div className="flex items-baseline mb-6">
                                                <span className="text-5xl font-black text-[#2d1960]">{pkg.speed}</span>
                                            </div>
                                            <div className="bg-[#f8fafc] rounded-xl p-4 mb-6">
                                                <span className="text-3xl font-black text-[#5e3186]">৳ {pkg.price}</span><span className="text-slate-500 font-medium"> / মাস</span>
                                            </div>
                                            <ul className="space-y-4 mb-8">
                                                {pkg.features.map((f, j) => (
                                                    <li key={j} className="flex items-start font-medium text-slate-600">
                                                        <i className="fa-solid fa-circle-check text-green-500 mt-1 mr-3"></i> {f}
                                                    </li>
                                                ))}
                                            </ul>
                                            <a href="https://wa.me/8801815151122" target="_blank" className="block text-center w-full bg-slate-100 text-[#2d1960] py-3.5 rounded-xl font-bold hover:bg-[#2d1960] hover:text-white transition-colors border border-slate-200">সংযোগ নিতে কল করুন</a>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Complaint & Reviews Section */}
                    <div id="contact" className="py-20 bg-slate-50 border-t border-slate-200">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12">
                            
                            {/* Complaint Form */}
                            <div className="bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
                                <h3 className="text-2xl font-bold text-[#2d1960] mb-6 flex items-center"><i className="fa-solid fa-headset mr-3 text-[#5e3186]"></i> অভিযোগ বা জিজ্ঞাসা</h3>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    submitComplaint({ id: Date.now(), name: e.target.name.value, phone: e.target.phone.value, details: e.target.details.value, date: new Date().toLocaleDateString('bn-BD') });
                                    alert('আপনার বার্তা সফলভাবে জমা হয়েছে। আমরা শীঘ্রই যোগাযোগ করবো।');
                                    e.target.reset();
                                }} className="space-y-5">
                                    <div><input required name="name" type="text" placeholder="আপনার নাম" className="w-full border-2 border-slate-100 p-4 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50" /></div>
                                    <div><input required name="phone" type="text" placeholder="মোবাইল নাম্বার" className="w-full border-2 border-slate-100 p-4 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50" /></div>
                                    <div><textarea required name="details" placeholder="অভিযোগ বা জিজ্ঞাসা বিস্তারিত লিখুন..." className="w-full border-2 border-slate-100 p-4 rounded-xl h-32 focus:border-[#5e3186] outline-none bg-slate-50 resize-none"></textarea></div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-[#2d1960] to-[#5e3186] text-white py-4 rounded-xl font-bold shadow-lg hover:shadow-xl transition-all">বার্তা পাঠান</button>
                                </form>
                            </div>

                            {/* Review Section */}
                            <div className="flex flex-col">
                                <div className="bg-white p-8 rounded-3xl shadow-lg border border-slate-100 mb-8">
                                    <h3 className="text-2xl font-bold text-[#2d1960] mb-6 flex items-center"><i className="fa-solid fa-star mr-3 text-yellow-400"></i> আপনার মন্তব্য (Review)</h3>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        submitReview({ id: Date.now(), customerName: e.target.name.value, rating: parseInt(e.target.rating.value), comment: e.target.comment.value, date: new Date().toLocaleDateString('bn-BD') });
                                        alert('ধন্যবাদ! আপনার রিভিউ জমা হয়েছে।');
                                        e.target.reset();
                                    }} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <input required name="name" type="text" placeholder="আপনার নাম" className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50" />
                                            <select required name="rating" className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50 font-bold text-slate-600">
                                                <option value="5">⭐⭐⭐⭐⭐ (অসাধারণ)</option>
                                                <option value="4">⭐⭐⭐⭐ (খুব ভালো)</option>
                                                <option value="3">⭐⭐⭐ (মোটামুটি)</option>
                                            </select>
                                        </div>
                                        <div><input required name="comment" type="text" placeholder="আপনার অভিজ্ঞতা লিখুন..." className="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50" /></div>
                                        <button type="submit" className="bg-[#2d1960] text-white px-6 py-3 rounded-xl font-bold hover:bg-[#5e3186] transition-colors">রিভিউ জমা দিন</button>
                                    </form>
                                </div>

                                {/* Recent Reviews List */}
                                <div className="flex-1 overflow-y-auto max-h-64 space-y-4 pr-2">
                                    {reviews.map(r => (
                                        <div key={r.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-slate-800">{r.customerName}</h4>
                                                <div className="text-yellow-400 text-xs">{[...Array(5)].map((_, i) => <i key={i} className={`fa-star ${i < r.rating ? 'fa-solid' : 'fa-regular text-slate-200'}`}></i>)}</div>
                                            </div>
                                            <p className="text-slate-600 text-sm italic">"{r.comment}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-[#1e293b] text-slate-300 py-12 border-t-4 border-[#5e3186]">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center md:text-left">
                            <div>
                                <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Logo" className="h-12 bg-white rounded-lg p-1 mx-auto md:mx-0 mb-6" />
                                <p className="text-sm leading-relaxed mb-4">গতি এক্সপ্রেস আপনাকে দিচ্ছে নিরবচ্ছিন্ন ও উচ্চ গতির ইন্টারনেট পরিষেবা। আমাদের লক্ষ্য গ্রাহকের সর্বোচ্চ সন্তুষ্টি নিশ্চিত করা।</p>
                            </div>
                            <div>
                                <h4 className="text-white font-bold text-lg mb-6 uppercase tracking-wider">যোগাযোগ</h4>
                                <p className="mb-3"><i className="fa-solid fa-location-dot mr-2 text-purple-400"></i> উপজেলা মোড়, মাস্টার মার্কেট (২য় তলা),<br/>হরিনাকুন্ডু, ঝিনাইদহ।</p>
                                <p className="mb-2"><i className="fa-solid fa-phone mr-2 text-purple-400"></i> ০১৮১৩-৯১০৮৫০</p>
                                <p><i className="fa-solid fa-phone mr-2 text-purple-400"></i> ০১৮১৫-১৫১১২২</p>
                            </div>
                            <div>
                                <h4 className="text-white font-bold text-lg mb-6 uppercase tracking-wider">গুরুত্বপূর্ণ লিংক</h4>
                                <ul className="space-y-3">
                                    <li><a href="https://portal.inetbills.com/" target="_blank" className="hover:text-white transition"><i className="fa-solid fa-angle-right mr-2 text-[#5e3186]"></i> সেলফ কেয়ার (Self Care)</a></li>
                                    <li><a href="#packages" className="hover:text-white transition"><i className="fa-solid fa-angle-right mr-2 text-[#5e3186]"></i> প্যাকেজ সমূহ</a></li>
                                    <li><a href="https://wa.me/8801815151122" target="_blank" className="hover:text-white transition"><i className="fa-solid fa-angle-right mr-2 text-[#5e3186]"></i> হোয়াটসঅ্যাপ সাপোর্ট</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="mt-12 pt-6 border-t border-slate-800 text-center text-xs text-slate-500">
                            &copy; {new Date().getFullYear()} Goti Express. All rights reserved.
                        </div>
                    </footer>

                    {/* Floating WhatsApp Button */}
                    <a href="https://wa.me/8801815151122" target="_blank" className="fixed bottom-6 right-6 w-14 h-14 bg-green-500 text-white rounded-full flex items-center justify-center text-3xl shadow-[0_0_15px_rgba(34,197,94,0.5)] hover:bg-green-600 hover:scale-110 transition-all z-50 animate-bounce">
                        <i className="fa-brands fa-whatsapp"></i>
                    </a>
                </div>
            );
        }

        // Hero Slider Component
        function HeroSlider({ banners }) {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                if(banners.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentIndex(prev => (prev + 1) % banners.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [banners]);

            return (
                <div className="absolute inset-0 w-full h-full">
                    {banners.map((url, i) => (
                        <div key={i} className={`absolute inset-0 transition-opacity duration-1000 ${i === currentIndex ? 'opacity-100' : 'opacity-0'}`}>
                            <div className="absolute inset-0 bg-black/40 z-10"></div>
                            <img src={url} className="w-full h-full object-cover" />
                        </div>
                    ))}
                    <div className="absolute inset-0 z-20 flex flex-col items-center justify-center text-white px-6 text-center">
                        <h1 className="text-4xl md:text-6xl font-black mb-6 leading-tight drop-shadow-lg">গতি এক্সপ্রেস <br/> ব্রডব্যান্ড ইন্টারনেট</h1>
                        <a href="#packages" className="bg-gradient-to-r from-[#2d1960] to-[#5e3186] px-8 py-4 rounded-full font-bold text-lg hover:shadow-lg hover:shadow-purple-900/50 transition-all border border-purple-400/30"><i className="fa-solid fa-rocket mr-2"></i> প্যাকেজ সমূহ দেখুন</a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
