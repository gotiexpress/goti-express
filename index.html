<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গতি এক্সপ্রেস - Goti Express</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #5e3186; border-radius: 10px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .logo-animate { animation: floatLogo 3s ease-in-out infinite; }

        @keyframes spinGear { 100% { transform: rotate(360deg); } }
        @keyframes spinGearReverse { 100% { transform: rotate(-360deg); } }
        
        .gear-slow { animation: spinGear 30s linear infinite; }
        .gear-slow-reverse { animation: spinGearReverse 40s linear infinite; }
        
        .gradient-text {
            background: linear-gradient(to right, #2d1960, #5e3186);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-theme-gradient {
            background: linear-gradient(135deg, #2d1960 0%, #5e3186 100%);
        }
    </style>
</head>
<body class="relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBmJGTuAvMF9FM6MwOSi4BZqFmGyqb2Yd0",
            authDomain: "goti-express.firebaseapp.com",
            projectId: "goti-express",
            storageBucket: "goti-express.firebasestorage.app",
            messagingSenderId: "427378824805",
            appId: "1:427378824805:web:54373b156fc7f40f65588c"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 🌐 Public Database Hook
        function usePublicData() {
            const [webConfig, setWebConfig] = useState(null);
            const [packages, setPackages] = useState([]);
            const [reviews, setReviews] = useState([]);
            
            useEffect(() => {
                const unsubConfig = db.collection('websiteConfig').doc('1').onSnapshot(doc => {
                    if(doc.exists) setWebConfig(doc.data());
                });
                const unsubPackages = db.collection('packages').orderBy('price', 'asc').onSnapshot(snap => {
                    setPackages(snap.docs.map(d => d.data()));
                });
                const unsubReviews = db.collection('reviews').orderBy('id', 'desc').limit(10).onSnapshot(snap => {
                    setReviews(snap.docs.map(d => d.data()));
                });
                return () => { unsubConfig(); unsubPackages(); unsubReviews(); };
            }, []);

            const submitComplaint = (data) => db.collection('complaints').doc(data.id.toString()).set(data);
            const submitReview = (data) => db.collection('reviews').doc(data.id.toString()).set(data);
            
            return { webConfig, packages, reviews, submitComplaint, submitReview };
        }

        function App() {
            const { webConfig, packages, reviews, submitComplaint, submitReview } = usePublicData();
            const [showPopup, setShowPopup] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const [showAllPkgs, setShowAllPkgs] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if(webConfig?.adsStatus && webConfig?.popupUrl) {
                    const timer = setTimeout(() => setShowPopup(true), 2000);
                    return () => clearTimeout(timer);
                } else {
                    setShowPopup(false);
                }
            }, [webConfig]);

            // Packages logic
            const visiblePackages = showAllPkgs ? packages : packages.slice(0, 3);

            return (
                <div className="relative overflow-hidden min-h-screen">
                    
                    {/* Animated Background Gears (24/7 Active feel) */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-[0.03]">
                        <i className="fa-solid fa-gear absolute top-20 left-10 text-[20vw] text-[#2d1960] gear-slow"></i>
                        <i className="fa-solid fa-gear absolute bottom-40 right-[-5vw] text-[30vw] text-[#5e3186] gear-slow-reverse"></i>
                        <i className="fa-solid fa-gear absolute top-1/2 left-[30vw] text-[15vw] text-[#2d1960] gear-slow"></i>
                    </div>

                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-40 transition-all duration-300 ${scrolled ? 'bg-white shadow-lg py-3' : 'bg-white/90 backdrop-blur-md py-4'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center relative z-10">
                            {/* Animated Logo */}
                            <div className="flex items-center gap-3 cursor-pointer logo-animate" onClick={()=>window.scrollTo(0,0)}>
                                <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Goti Express" className="h-10 md:h-12 object-contain" />
                                <span className="text-2xl md:text-3xl font-black gradient-text tracking-wide drop-shadow-sm">গতি এক্সপ্রেস</span>
                            </div>
                            
                            {/* Hamburger Icon */}
                            <button onClick={() => setMenuOpen(true)} className="text-[#2d1960] text-3xl hover:text-[#5e3186] transition-colors">
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </nav>

                    {}
                    {/* Sidebar Drawer */}
                    {menuOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>
                            <div className="relative w-72 bg-white h-full shadow-2xl flex flex-col animate-fade-in">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <span className="font-bold text-[#2d1960] text-lg">মেনু</span>
                                    <button onClick={() => setMenuOpen(false)} className="w-8 h-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto py-4">
                                    <ul className="space-y-1">
                                        {[
                                            { id: 'home', icon: 'fa-house', name: 'হোম' },
                                            { id: 'about', icon: 'fa-bolt', name: 'সার্ভিসেস' },
                                            { id: 'packages', icon: 'fa-wifi', name: 'প্যাকেজ' },
                                            { id: 'about', icon: 'fa-map-location-dot', name: 'কভারেজ' },
                                            { id: 'contact', icon: 'fa-headset', name: 'সাপোর্ট' },
                                            { id: 'complaint', icon: 'fa-triangle-exclamation', name: 'অভিযোগ' },
                                            { id: 'review', icon: 'fa-star', name: 'রিভিউ' },
                                            { id: 'contact', icon: 'fa-address-book', name: 'যোগাযোগ' }
                                        ].map(item => (
                                            <li key={item.name}>
                                                <a href={`#${item.id}`} onClick={() => setMenuOpen(false)} className="flex items-center px-6 py-3 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]">
                                                    <i className={`fa-solid ${item.icon} w-6 text-center mr-3 text-lg opacity-70`}></i> {item.name}
                                                </a>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Popup Ad */}
                    {showPopup && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="relative bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl">
                                <button onClick={() => setShowPopup(false)} className="absolute top-3 right-3 bg-white text-slate-800 w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-md hover:bg-red-500 hover:text-white transition z-10"><i className="fa-solid fa-xmark"></i></button>
                                <img src={webConfig.popupUrl} alt="Advertisement" className="w-full h-auto object-contain" />
                            </div>
                        </div>
                    )}

                    {}
                    {/* Hero Section */}
                    <div id="home" className="relative pt-20 md:pt-24 bg-[#f8fafc] z-10">
                        <div className="w-full aspect-[16/9] md:aspect-[21/9] lg:h-[60vh] max-h-[600px] overflow-hidden rounded-b-[2rem] md:rounded-b-[4rem] shadow-xl relative">
                            {(!webConfig?.banners || webConfig.banners.length === 0) ? (
                                <div className="absolute inset-0 bg-theme-gradient flex flex-col items-center justify-center text-white px-6 text-center">
                                    <h1 className="text-4xl md:text-6xl font-black mb-4 logo-animate">গতি এক্সপ্রেস</h1>
                                    <p className="text-lg md:text-2xl text-purple-200">গতি এক্সপ্রেস ব্রডব্যান্ড ইন্টারনেট</p>
                                </div>
                            ) : (
                                <HeroSlider banners={webConfig.banners} />
                            )}
                        </div>
                    </div>

                    {/* 24/7 Active Banner */}
                    <div className="bg-theme-gradient py-4 text-white overflow-hidden shadow-inner relative z-10 -mt-6 mx-4 md:mx-auto md:max-w-5xl rounded-2xl">
                        <div className="px-6 flex justify-around items-center text-sm md:text-base font-bold">
                            <span className="flex items-center"><i className="fa-solid fa-headset mr-2 text-yellow-300 text-xl animate-pulse"></i> ২৪/৭ সাপোর্ট</span>
                            <span className="flex items-center"><i className="fa-solid fa-bolt mr-2 text-yellow-300 text-xl"></i> সুপার ফাস্ট</span>
                            <span className="hidden md:flex items-center"><i className="fa-solid fa-shield-halved mr-2 text-yellow-300 text-xl"></i> নিরাপদ নেটওয়ার্ক</span>
                        </div>
                    </div>

                    {}
                    {/* About Company & Services */}
                    <div id="about" className="py-20 relative z-10">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <div className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-slate-100">
                                <h2 className="text-3xl md:text-4xl font-black gradient-text mb-6">গতি এক্সপ্রেসে আপনাকে স্বাগতম</h2>
                                <p className="text-lg text-slate-600 leading-relaxed max-w-4xl mx-auto font-medium mb-10">
                                    আমরা দিচ্ছি নিরবচ্ছিন্ন, বাফার-ফ্রি ও উচ্চ গতির ব্রডব্যান্ড ইন্টারনেট পরিষেবা। আপনার বিনোদন, ফ্রিল্যান্সিং, অনলাইন ক্লাস কিংবা অফিশিয়াল কাজের জন্য গতি এক্সপ্রেস হতে পারে আপনার সবচেয়ে নির্ভরযোগ্য সঙ্গী। আমাদের ডেডিকেটেড টিম ২৪/৭ গ্রাহক সেবায় নিয়োজিত আছে। আমাদের কভারেজ এরিয়া- হরিণাকুণ্ডু এবং আশেপাশের এলাকা।
                                </p>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100"><i className="fa-solid fa-rocket text-4xl text-[#5e3186] mb-4"></i><h4 className="font-bold text-slate-800">হাই স্পিড</h4></div>
                                    <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100"><i className="fa-solid fa-server text-4xl text-[#5e3186] mb-4"></i><h4 className="font-bold text-slate-800">BDIX সাপোর্ট</h4></div>
                                    <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100"><i className="fa-solid fa-gamepad text-4xl text-[#5e3186] mb-4"></i><h4 className="font-bold text-slate-800">স্মুথ গেমিং</h4></div>
                                    <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100"><i className="fa-solid fa-headset text-4xl text-[#5e3186] mb-4"></i><h4 className="font-bold text-slate-800">সার্বক্ষণিক সাপোর্ট</h4></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {}
                    {/* Packages Section */}
                    <div id="packages" className="py-12 relative z-10">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-12 animate-fade-in">
                                <h2 className="text-3xl md:text-4xl font-black text-[#2d1960] mb-4">আমাদের জনপ্রিয় প্যাকেজসমূহ</h2>
                                <div className="w-24 h-1.5 bg-[#5e3186] mx-auto rounded-full"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {packages.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-500 p-10 bg-white rounded-3xl border border-dashed">শীঘ্রই নতুন প্যাকেজ আপডেট করা হবে।</div>
                                ) : (
                                    visiblePackages.map((pkg, i) => (
                                        <div key={pkg.id} className="bg-white rounded-3xl p-8 border-2 border-slate-100 shadow-xl hover:border-[#5e3186] hover:-translate-y-2 transition-all duration-300 relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-theme-gradient opacity-10 rounded-bl-full transition-transform group-hover:scale-125"></div>
                                            <h3 className="text-2xl font-bold text-slate-800 mb-2">{pkg.name}</h3>
                                            <div className="flex items-baseline mb-6">
                                                <span className="text-5xl font-black text-[#2d1960]">{pkg.speed}</span>
                                            </div>
                                            <div className="bg-[#f8fafc] rounded-2xl p-5 mb-6 text-center border border-slate-100">
                                                <span className="text-4xl font-black text-[#5e3186]">৳ {pkg.price}</span><span className="text-slate-500 font-bold ml-1">/ মাস</span>
                                            </div>
                                            <ul className="space-y-4 mb-8">
                                                {pkg.features.map((f, j) => (
                                                    <li key={j} className="flex items-start font-medium text-slate-600">
                                                        <i className="fa-solid fa-circle-check text-green-500 mt-1 mr-3"></i> {f}
                                                    </li>
                                                ))}
                                            </ul>
                                            <a href="https://wa.me/8801815151122" target="_blank" className="block text-center w-full bg-slate-100 text-[#2d1960] py-4 rounded-xl font-bold hover:bg-[#2d1960] hover:text-white transition-colors border border-slate-200">কানেকশন নিতে কল করুন</a>
                                        </div>
                                    ))
                                )}
                            </div>
                            
                            {/* See More Button */}
                            {packages.length > 3 && !showAllPkgs && (
                                <div className="text-center mt-12">
                                    <button onClick={() => setShowAllPkgs(true)} className="bg-white text-[#2d1960] px-8 py-3.5 rounded-full font-bold shadow-md border border-slate-200 hover:bg-[#2d1960] hover:text-white transition-colors">
                                        আরও দেখুন <i className="fa-solid fa-angle-down ml-2"></i>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {}
                    {/* Review Section */}
                    <div id="review" className="py-20 relative z-10">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Add Review */}
                            <div className="lg:col-span-1 bg-theme-gradient p-8 rounded-3xl shadow-xl text-white">
                                <h3 className="text-2xl font-bold mb-6 flex items-center"><i className="fa-solid fa-star text-yellow-400 mr-3"></i> মতামত দিন</h3>
                                <p className="text-purple-200 mb-6 text-sm">আপনার মূল্যবান মতামত আমাদের সেবার মান উন্নত করতে সাহায্য করবে।</p>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    submitReview({ id: Date.now(), customerName: e.target.name.value, rating: parseInt(e.target.rating.value), comment: e.target.comment.value, date: new Date().toLocaleDateString('bn-BD') });
                                    alert('ধন্যবাদ! আপনার রিভিউ জমা হয়েছে।');
                                    e.target.reset();
                                }} className="space-y-4">
                                    <input required name="name" type="text" placeholder="আপনার নাম" className="w-full bg-white/10 border border-white/20 p-3.5 rounded-xl outline-none text-white placeholder:text-white/60 focus:bg-white/20 transition" />
                                    <select required name="rating" className="w-full bg-white/10 border border-white/20 p-3.5 rounded-xl outline-none text-white focus:bg-white/20 transition [&>option]:text-slate-800">
                                        <option value="5">⭐⭐⭐⭐⭐ (অসাধারণ)</option>
                                        <option value="4">⭐⭐⭐⭐ (খুব ভালো)</option>
                                        <option value="3">⭐⭐⭐ (মোটামুটি)</option>
                                    </select>
                                    <textarea required name="comment" placeholder="আপনার অভিজ্ঞতা লিখুন..." className="w-full bg-white/10 border border-white/20 p-3.5 rounded-xl outline-none text-white placeholder:text-white/60 focus:bg-white/20 transition h-24 resize-none"></textarea>
                                    <button type="submit" className="w-full bg-white text-[#2d1960] py-3.5 rounded-xl font-bold hover:bg-purple-50 transition-colors shadow-lg">রিভিউ জমা দিন</button>
                                </form>
                            </div>

                            {/* View Reviews */}
                            <div className="lg:col-span-2 flex flex-col justify-center space-y-4">
                                {reviews.length === 0 ? <p className="text-slate-500 text-center">এখনো কোনো রিভিউ দেওয়া হয়নি।</p> : 
                                    reviews.map((r, idx) => (
                                    <div key={r.id} className="bg-white p-6 rounded-3xl shadow-md border border-slate-100 flex items-start gap-4 animate-fade-in" style={{animationDelay: `${idx*50}ms`}}>
                                        <div className="w-12 h-12 bg-purple-100 text-[#5e3186] rounded-full flex items-center justify-center font-bold text-xl shrink-0">{r.customerName.charAt(0)}</div>
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <h4 className="font-bold text-slate-800">{r.customerName}</h4>
                                                <div className="text-yellow-400 text-xs">
                                                    {[...Array(5)].map((_, i) => <i key={i} className={`fa-star ${i < r.rating ? 'fa-solid' : 'fa-regular text-slate-300'}`}></i>)}
                                                </div>
                                            </div>
                                            <p className="text-slate-600 text-sm italic leading-relaxed">"{r.comment}"</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Dedicated Bill Payment CTA */}
                    <div className="py-12 relative z-10 px-6">
                        <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row items-center border border-slate-100">
                            <div className="p-8 md:p-12 md:w-2/3">
                                <h3 className="text-3xl font-black text-[#2d1960] mb-4">আপনার মাসিক বিল পরিশোধ করুন সহজেই</h3>
                                <p className="text-slate-600 font-medium mb-8">এখন ঘরে বসেই বিকাশ, নগদ, রকেট বা ডেবিট/ক্রেডিট কার্ডের মাধ্যমে আপনার ইন্টারনেট বিল পরিশোধ করতে পারবেন অত্যন্ত নিরাপদে।</p>
                                <a href="https://portal.inetbills.com/" target="_blank" className="inline-block bg-[#2d1960] text-white px-10 py-4 rounded-full font-bold text-lg hover:bg-[#5e3186] transition-colors shadow-lg hover:shadow-xl"><i className="fa-solid fa-credit-card mr-2 text-purple-300"></i> অনলাইনে বিল পরিশোধ করুন</a>
                            </div>
                            <div className="md:w-1/3 bg-purple-50 flex items-center justify-center p-8 h-full w-full border-t md:border-t-0 md:border-l border-slate-100">
                                <i className="fa-solid fa-mobile-screen-button text-[8rem] text-[#5e3186] opacity-80 logo-animate"></i>
                            </div>
                        </div>
                    </div>

        // Hero Slider Component (No text overlay, smooth fading)
        function HeroSlider({ banners }) {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                if(banners.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentIndex(prev => (prev + 1) % banners.length);
                }, 4000); // Change image every 4 seconds
                return () => clearInterval(timer);
            }, [banners]);

            return (
                <div className="absolute inset-0 w-full h-full bg-slate-900">
                    {banners.map((url, i) => (
                        <img 
                            key={i} 
                            src={url} 
                            className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out ${i === currentIndex ? 'opacity-100' : 'opacity-0'}`} 
                            alt={`Banner ${i+1}`}
                        />
                    ))}
                    {/* Subtle gradient overlay to make navbar stand out more */}
                    <div className="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/10"></div>
                </div>
            );
        }
